<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Elite-data1</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="initCheckout()">
    <header>
        <h1>Elite-data1</h1>
        <nav>
            <ul>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="checkout">
            <h2>Complete Your Purchase</h2>
            <div id="order-details">
                <p><strong>Product:</strong> <span id="product-name"></span></p>
                <p><strong>Amount:</strong> GHS <span id="amount"></span></p>
                <p><strong>Phone:</strong> <span id="phone"></span></p>
            </div>
            <button id="pay-btn" onclick="initiatePayment()">Pay with Mobile Money</button>
            <button onclick="goBack()">Cancel</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Elite-data1</p>
    </footer>
    <script src="https://checkout.flutterwave.com/v3.js"></script>
    <script src="js/app.js"></script>
    <script>
        let orderData = {};

        function initCheckout() {
            // Get order data from URL parameters
            const params = new URLSearchParams(window.location.search);
            orderData = {
                bundleId: params.get('bundle'),
                phone: params.get('phone'),
                amount: params.get('amount'),
                productName: params.get('product')
            };

            // Display order details
            document.getElementById('product-name').innerText = orderData.productName || 'Data Bundle';
            document.getElementById('amount').innerText = orderData.amount || '0.00';
            document.getElementById('phone').innerText = orderData.phone || 'N/A';

            if (!orderData.amount || !orderData.phone) {
                alert('Invalid order data');
                window.location.href = 'buy-data.html';
            }
        }

        function initiatePayment() {
            const user = supabase.auth.user();
            if (!user) {
                alert('Please login first');
                window.location.href = 'login.html';
                return;
            }

            // Flutterwave payment configuration
            FlutterWaveCheckout({
                public_key: "FLUTTERWAVE_PUBLIC_KEY",  // Replace with your Flutterwave public key
                tx_ref: "TXN-" + Date.now(),
                amount: parseFloat(orderData.amount),
                currency: "GHS",
                payment_options: "mobilemoney,card",
                customer: {
                    email: user.email,
                    phonenumber: orderData.phone,
                    name: user.email.split('@')[0]
                },
                customizations: {
                    title: "Elite-data1",
                    description: orderData.productName,
                    logo: ""
                },
                callback: onPaymentSuccess,
                onclose: onPaymentClose
            });
        }

        async function onPaymentSuccess(response) {
            console.log('Payment successful:', response);
            
            if (response.status === "successful") {
                // Create order in database
                const user = supabase.auth.user();
                const { data, error } = await supabase
                    .from('orders')
                    .insert([{
                        user_id: user.id,
                        bundle_id: orderData.bundleId,
                        phone: orderData.phone,
                        status: 'completed',
                        created_at: new Date().toISOString()
                    }]);

                if (error) {
                    console.error('Error creating order:', error);
                    alert('Error saving order. Contact support.');
                    return;
                }

                // Send Telegram alert
                const alertMessage = `✅ PAYMENT SUCCESSFUL\n💰 Amount: GHS ${orderData.amount}\n📦 Product: ${orderData.productName}\n📱 Phone: ${orderData.phone}\n👤 User: ${user.email}\n⏰ Time: ${new Date().toLocaleString()}\nTransaction ID: ${response.transaction_id}`;
                await sendTelegramAlert(alertMessage);

                // Show success message
                alert('Payment successful! Your data/airtime will be delivered shortly.');
                window.location.href = 'dashboard.html';
            } else {
                alert('Payment failed. Please try again.');
                window.location.href = 'buy-data.html';
            }
        }

        function onPaymentClose() {
            alert('Payment cancelled');
            window.location.href = 'buy-data.html';
        }

        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
