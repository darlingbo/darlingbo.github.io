<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Elite-data1</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="checkAuth()">
    <header>
        <h1>Admin Panel</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="manage-bundles">
            <h2>Manage Data Bundles</h2>
            <button id="add-sample-bundles">Add Sample Bundles</button>
            <ul id="bundles-list"></ul>
            <h3>Add New Bundle</h3>
            <form id="add-bundle-form">
                <label for="add-name">Name:</label>
                <input type="text" id="add-name" required>
                <label for="add-price">Price (GHS):</label>
                <input type="number" id="add-price" step="0.01" required>
                <label for="add-details">Details:</label>
                <textarea id="add-details"></textarea>
                <label for="add-network">Network:</label>
                <select id="add-network" required>
                    <option value="MTN">MTN</option>
                    <option value="Telecel">Telecel</option>
                    <option value="Airtel Tigo">Airtel Tigo</option>
                </select>
                <button type="submit">Add Bundle</button>
            </form>
            <h3>Update Bundle</h3>
            <form id="update-bundle-form">
                <label for="bundle-id">Bundle ID:</label>
                <input type="text" id="bundle-id" required>
                <label for="price">Price:</label>
                <input type="number" id="price" required>
                <label for="details">Details:</label>
                <textarea id="details"></textarea>
                <button type="submit">Update Bundle</button>
            </form>
        </section>
        <section id="manage-orders">
            <h2>Manage Orders</h2>
            <ul id="orders-list"></ul>
            <form id="update-order-form">
                <label for="order-id">Order ID:</label>
                <input type="text" id="order-id" required>
                <label for="status">Status:</label>
                <select id="status">
                    <option value="pending">Pending</option>
                    <option value="completed">Completed</option>
                    <option value="failed">Failed</option>
                </select>
                <button type="submit">Update Status</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Elite-data1</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="js/app.js"></script>
    <script>
        async function loadBundles() {
            const bundles = await getAllBundles();
            const list = document.getElementById('bundles-list');
            list.innerHTML = '';
            
            if (!bundles || bundles.length === 0) {
                list.innerHTML = '<li>No bundles found</li>';
                return;
            }
            
            bundles.forEach(bundle => {
                const li = document.createElement('li');
                li.textContent = `${bundle.name}: GHS ${bundle.price} - ${bundle.details}`;
                list.appendChild(li);
            });
        }

        async function addSampleBundles() {
            const bundles = [
                { name: '1GB Data Bundle', price: 5.23, details: 'MTN 1GB Data Bundle', network: 'MTN' },
                { name: '2GB Data Bundle', price: 10.00, details: 'MTN 2GB Data Bundle', network: 'MTN' },
                { name: '5GB Data Bundle', price: 25.00, details: 'MTN 5GB Data Bundle', network: 'MTN' },
                { name: '10GB Data Bundle', price: 50.00, details: 'MTN 10GB Data Bundle', network: 'MTN' },
                { name: '1GB Data Bundle', price: 5.50, details: 'Telecel 1GB Data Bundle', network: 'Telecel' },
                { name: '2GB Data Bundle', price: 10.50, details: 'Telecel 2GB Data Bundle', network: 'Telecel' },
                { name: '5GB Data Bundle', price: 26.00, details: 'Telecel 5GB Data Bundle', network: 'Telecel' },
                { name: '10GB Data Bundle', price: 52.00, details: 'Telecel 10GB Data Bundle', network: 'Telecel' },
                { name: '1GB Data Bundle', price: 5.00, details: 'Airtel Tigo 1GB Data Bundle', network: 'Airtel Tigo' },
                { name: '2GB Data Bundle', price: 9.50, details: 'Airtel Tigo 2GB Data Bundle', network: 'Airtel Tigo' },
                { name: '5GB Data Bundle', price: 24.00, details: 'Airtel Tigo 5GB Data Bundle', network: 'Airtel Tigo' },
                { name: '10GB Data Bundle', price: 48.00, details: 'Airtel Tigo 10GB Data Bundle', network: 'Airtel Tigo' },
            ];

            for (const bundle of bundles) {
                await addBundle(bundle.name, bundle.price, bundle.details, bundle.network);
            }
            alert('Sample bundles added!');
            loadBundles();
        }

        async function loadOrders() {
            const orders = await getAllOrders();
            const list = document.getElementById('orders-list');
            list.innerHTML = '';
            
            if (!orders || orders.length === 0) {
                list.innerHTML = '<li>No orders found</li>';
                return;
            }
            
            orders.forEach(order => {
                const li = document.createElement('li');
                li.textContent = `Order ${order.id}: ${order.status} - ${order.phone}`;
                list.appendChild(li);
            });
        }

        document.getElementById('add-bundle-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('add-name').value;
            const price = document.getElementById('add-price').value;
            const details = document.getElementById('add-details').value;
            const network = document.getElementById('add-network').value;
            
            if (!name || !price || !network) {
                alert('Please fill in all required fields');
                return;
            }
            
            await addBundle(name, price, details, network);
            alert('Bundle added!');
            loadBundles();
            // Clear form
            document.getElementById('add-bundle-form').reset();
        });

        document.getElementById('update-bundle-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('bundle-id').value;
            const price = document.getElementById('price').value;
            const details = document.getElementById('details').value;
            
            if (!id || !price) {
                alert('Please fill in all fields');
                return;
            }
            
            await updateBundle(id, price, details);
            alert('Bundle updated!');
            loadBundles();
        });

        document.getElementById('update-order-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('order-id').value;
            const status = document.getElementById('status').value;
            
            if (!id) {
                alert('Please enter an order ID');
                return;
            }
            
            await updateOrderStatus(id, status);
            alert('Order updated!');
            loadOrders();
        });

        document.getElementById('add-sample-bundles').addEventListener('click', addSampleBundles);

        // Load data when page loads
        document.addEventListener('DOMContentLoaded', () => {
            loadBundles();
            loadOrders();
        });
    </script>
</body>
</html>
